services:
  - type: web
    name: tavsiyaai
    env: node
    plan: free
    buildCommand: "npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend"
    startCommand: "node backend/server.js"
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
